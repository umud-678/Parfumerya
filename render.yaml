# API-ni Render.com-da deploy etmək üçün (Vercel API-ni dəstəkləmir)
# https://render.com → New → Blueprint → bu repo

services:
  - type: web
    name: amoria-api
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGINS
        sync: false
